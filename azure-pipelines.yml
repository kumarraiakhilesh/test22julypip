trigger: none

pool:
  name: avriti   # आपका self-hosted Windows agent

steps:

# 🔹 Install Terraform
- task: TerraformInstaller@1
  displayName: "Install Terraform CLI"
  inputs:
    terraformVersion: 'latest'


# 🔹 Terraform Format
- script: |
    echo Running Terraform Format
    terraform fmt -recursive
  displayName: "Terraform Format Check"


# 🔹 Terraform Init
- task: TerraformTask@5
  displayName: "Terraform Init (Backend Setup)"
  inputs:
    provider: 'azurerm'
    command: 'init'
    backendServiceArm: 'avtsrv'
    backendAzureRmOverrideSubscriptionID: '18ed265f-7186-4239-bed6-23429dea97a7'
    backendAzureRmResourceGroupName: 'backendtest'
    backendAzureRmStorageAccountName: 'akhileshtest'
    backendAzureRmContainerName: 'canttest'
    backendAzureRmKey: 'pipe.tfstate'


# 🔹 Terraform Validate
- script: |
    echo Running Terraform Validate
    terraform validate
  displayName: "Terraform Validate"


# 🔹 Install TFLint (Windows)
- powershell: |

    Write-Host "Installing TFLint"

    Invoke-WebRequest `
    -Uri https://github.com/terraform-linters/tflint/releases/latest/download/tflint_windows_amd64.zip `
    -OutFile tflint.zip

    Expand-Archive tflint.zip -DestinationPath C:\tflint -Force

    # Add TFLint to Azure DevOps PATH
    echo "##vso[task.prependpath]C:\tflint"

    Write-Host "TFLint Installed"

    tflint --version

  displayName: "Install TFLint (Windows)"


# 🔹 Run TFLint
- powershell: |

    Write-Host "Running Terraform Lint"

    tflint --init
    tflint

  displayName: "Terraform Lint Check"


# 🔹 Terraform Plan
- task: TerraformTask@5
  displayName: "Terraform Plan"
  inputs:
    provider: 'azurerm'
    command: 'plan'
    environmentServiceNameAzureRM: 'avtsrv'